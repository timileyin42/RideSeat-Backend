<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rideway Admin{% block title %}{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin:0; padding:0; background:#EDE9FE; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif; min-height:100vh; }

    /* NAV */
    .nav { background:#4C1D95; padding:0 32px; display:flex; align-items:center; justify-content:space-between; height:60px; position:sticky; top:0; z-index:100; }
    .nav-brand { font-family:Georgia,'Palatino Linotype',serif; font-style:italic; font-size:24px; font-weight:700; color:#fff; letter-spacing:-0.5px; text-decoration:none; }
    .nav-links { display:flex; align-items:center; gap:6px; }
    .nav-link { font-size:13px; font-weight:500; color:#C4B5FD; text-decoration:none; padding:6px 14px; border-radius:20px; transition:background 0.15s,color 0.15s; }
    .nav-link:hover { background:rgba(255,255,255,0.1); color:#fff; }
    .nav-link.active { background:rgba(255,255,255,0.15); color:#fff; }
    .nav-link.danger { color:#FCA5A5; }
    .nav-link.danger:hover { background:rgba(239,68,68,0.15); color:#FCA5A5; }

    /* MAIN */
    .main { max-width:1100px; margin:0 auto; padding:32px 24px; }
    .page-title { font-size:22px; font-weight:700; color:#1F2937; margin:0 0 24px; }

    /* STAT CARDS */
    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin:0 0 32px; }
    .stat-card { background:#fff; border-radius:12px; padding:20px 24px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
    .stat-label { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:#9CA3AF; margin:0 0 8px; }
    .stat-value { font-size:32px; font-weight:700; color:#111827; margin:0; line-height:1; }
    .stat-value.green { color:#059669; }
    .stat-value.purple { color:#7C3AED; }
    .stat-value.amber { color:#D97706; }

    /* TABLE */
    .table-card { background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
    .table-header { padding:16px 24px; border-bottom:1px solid #F3F4F6; display:flex; align-items:center; justify-content:space-between; }
    .table-title { font-size:15px; font-weight:700; color:#111827; margin:0; }
    .search-input { padding:8px 14px; border:1.5px solid #E5E7EB; border-radius:8px; font-size:13px; color:#374151; width:260px; outline:none; font-family:inherit; }
    .search-input:focus { border-color:#7C3AED; }
    table { width:100%; border-collapse:collapse; }
    th { font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:#9CA3AF; text-align:left; padding:12px 20px; border-bottom:1px solid #F3F4F6; white-space:nowrap; }
    td { font-size:13px; color:#374151; padding:14px 20px; border-bottom:1px solid #F9FAFB; vertical-align:middle; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:#FAFAFA; }

    /* BADGES */
    .badge { display:inline-block; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; }
    .badge-driver { background:#EDE9FE; color:#5B21B6; }
    .badge-passenger { background:#F0FDF4; color:#166534; }
    .badge-both { background:#FEF3C7; color:#92400E; }
    .badge-pending { background:#FEF3C7; color:#92400E; }
    .badge-approved { background:#D1FAE5; color:#065F46; }
    .badge-rejected { background:#FEE2E2; color:#991B1B; }
    .badge-none { background:#F3F4F6; color:#6B7280; }
    .check { color:#059669; font-weight:700; }
    .cross { color:#9CA3AF; }

    /* FLASH */
    .flash { padding:12px 20px; border-radius:10px; margin-bottom:20px; font-size:14px; }
    .flash-ok  { background:#D1FAE5; color:#065F46; }
    .flash-err { background:#FEE2E2; color:#991B1B; }

    /* EMPTY */
    .empty { padding:48px 32px; text-align:center; }
    .empty-title { font-size:17px; font-weight:700; color:#111827; margin:0 0 6px; }
    .empty-sub { font-size:14px; color:#6B7280; }
  </style>
</head>
<body>

<nav class="nav">
  <a href="/admin/" class="nav-brand">Rideway</a>
  <div class="nav-links">
    <a href="/admin/" class="nav-link {% if active == 'overview' %}active{% endif %}">Overview</a>
    <a href="/admin/users" class="nav-link {% if active == 'users' %}active{% endif %}">Users</a>
    <a href="/admin/verification" class="nav-link {% if active == 'verification' %}active{% endif %}">
      Verification{% if pending_count %} <span style="background:#7C3AED;color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px;">{{ pending_count }}</span>{% endif %}
    </a>
    <a href="/admin/logout" class="nav-link danger">Sign out</a>
  </div>
</nav>

<div class="main">
  {% block content %}{% endblock %}
</div>

</body>
</html>
