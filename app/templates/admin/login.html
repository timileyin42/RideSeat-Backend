<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rideway Admin — Sign in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      min-height: 100vh;
      background: #EDE9FE;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      width: 100%; max-width: 420px;
      margin: 24px 16px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(76,29,149,0.18);
    }
    .header {
      background: #4C1D95;
      padding: 36px 40px 28px;
      text-align: center;
    }
    .header-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: 2px; color: #C4B5FD;
      text-transform: uppercase; margin: 0 0 10px;
    }
    .brand {
      font-family: Georgia, 'Palatino Linotype', serif;
      font-style: italic; font-size: 38px; font-weight: 700;
      color: #fff; letter-spacing: -0.5px; margin: 0 0 6px;
    }
    .header-sub {
      font-size: 14px; color: #C4B5FD; margin: 0;
    }
    .body {
      background: #fff;
      padding: 36px 40px 32px;
    }
    .error {
      background: #FEE2E2; border-left: 4px solid #EF4444;
      border-radius: 8px; padding: 12px 16px;
      font-size: 13px; color: #991B1B;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 13px; font-weight: 600; color: #374151;
      margin-bottom: 6px;
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #D1D5DB;
      border-radius: 8px;
      font-size: 15px;
      color: #111827;
      background: #F9FAFB;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 20px;
      font-family: inherit;
    }
    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #7C3AED;
      background: #fff;
    }
    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: #7C3AED;
      color: #fff;
      font-size: 15px; font-weight: 600;
      border: none; border-radius: 50px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    button[type="submit"]:hover { background: #6D28D9; }
    .footer {
      background: #F5F3FF;
      padding: 16px 40px;
      border-top: 1px solid #E5E7EB;
      text-align: center;
      font-size: 12px; color: #9CA3AF;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <p class="header-label">Admin Portal</p>
      <p class="brand">Rideway</p>
      <p class="header-sub">Sign in to manage the platform</p>
    </div>
    <div class="body">
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form method="post" action="/admin/login">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="admin@rideway.co.uk"
               value="{{ email or '' }}" required autocomplete="username">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••••••" required autocomplete="current-password">
        <button type="submit">Sign in to Admin</button>
      </form>
    </div>
    <div class="footer">Rideway &copy; 2026 &mdash; Authorised access only</div>
  </div>
</body>
</html>
